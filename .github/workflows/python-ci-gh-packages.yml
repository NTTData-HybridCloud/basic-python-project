name: Python CI + Artifact to GitHub Packages

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          if [ -d test ]; then
            python -m unittest discover -s test -p "test_*.py"
          else
            echo "No test directory found. Skipping tests."
          fi

      - name: Create CI artifact
        run: |
          mkdir -p dist
          tar -czf dist/ci-artifact-${GITHUB_SHA}.tar.gz src README.md 2>/dev/null || tar -czf dist/ci-artifact-${GITHUB_SHA}.tar.gz .

      - name: Upload artifact to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifact-${{ github.sha }}
          path: dist/ci-artifact-${{ github.sha }}.tar.gz

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push artifact to GitHub Packages (GHCR)
        run: |
          IMAGE_REF="ghcr.io/${GITHUB_REPOSITORY,,}/ci-artifact:${GITHUB_SHA}"
          oras push "$IMAGE_REF" \
            "dist/ci-artifact-${GITHUB_SHA}.tar.gz:application/vnd.ci.artifact.layer.v1+tar+gzip"
